<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AZ-104 Study Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1320; --bg-glow:#13243b; --card:#131f30; --card-2:#172538;
    --line:rgba(255,255,255,.07); --line-strong:rgba(255,255,255,.13);
    --txt:#e7eef8; --muted:#8597ad; --muted-2:#5f7187;
    --cyan:#38b6ff; --teal:#2dd4a7; --amber:#f5b14c;
    --shadow:0 18px 50px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1100px 540px at 50% -160px, var(--bg-glow), transparent 70%), var(--bg);
    color:var(--txt); font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh; line-height:1.5;
  }
  .wrap{max-width:780px;margin:0 auto;padding:0 16px 80px;}

  .hero{position:sticky;top:0;z-index:30;margin:0 -16px 16px;padding:18px 16px 14px;
    background:linear-gradient(180deg, rgba(11,19,32,.97) 72%, rgba(11,19,32,0)); backdrop-filter:blur(8px);}
  .eyebrow{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--cyan);margin:0 0 6px;display:flex;align-items:center;gap:8px;}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);}
  h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:25px;line-height:1.1;margin:0 0 13px;letter-spacing:-.01em;}
  .meter{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:9px;}
  .meter .count{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:32px;line-height:1;letter-spacing:-.02em;}
  .meter .count small{font-size:14px;color:var(--muted);font-weight:500;}
  .meter .pct{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--teal);
    background:rgba(45,212,167,.1);border:1px solid rgba(45,212,167,.25);padding:4px 9px;border-radius:8px;}
  .bar{height:9px;border-radius:6px;background:#0a1422;border:1px solid var(--line);overflow:hidden;}
  .bar > span{display:block;height:100%;width:0;border-radius:5px;background:linear-gradient(90deg,var(--cyan),var(--teal));
    transition:width .55s cubic-bezier(.22,1,.36,1);position:relative;}
  .bar > span::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    transform:translateX(-100%);animation:shimmer 2.4s linear infinite;}
  @keyframes shimmer{to{transform:translateX(100%);}}
  .chips{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}
  .chip{flex:1 1 0;min-width:54px;font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted);
    background:var(--card);border:1px solid var(--line);border-radius:9px;padding:7px 6px;text-align:center;}
  .chip b{display:block;color:var(--txt);font-size:12px;margin-top:2px;}
  .chip .seg{height:3px;border-radius:2px;background:#0a1422;margin-top:6px;overflow:hidden;}
  .chip .seg > i{display:block;height:100%;background:var(--cyan);width:0;transition:width .5s ease;}

  .toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:14px;}
  .search{flex:1 1 180px;min-width:140px;display:flex;align-items:center;gap:8px;background:var(--card);
    border:1px solid var(--line-strong);border-radius:10px;padding:8px 11px;}
  .search input{flex:1;background:none;border:0;color:var(--txt);font-family:inherit;font-size:13px;outline:none;}
  .search input::placeholder{color:var(--muted-2);}
  .search .mi{color:var(--muted);font-size:13px;}
  .btn{font-family:"Inter",sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:var(--card);
    color:var(--txt);border:1px solid var(--line-strong);border-radius:10px;padding:8px 13px;
    display:inline-flex;align-items:center;gap:7px;transition:border-color .15s,background .15s;}
  .btn:hover{border-color:var(--cyan);}
  .btn.toggled{background:rgba(56,182,240,.12);border-color:var(--cyan);color:var(--cyan);}
  .btn.ghost{background:transparent;color:var(--muted);}
  .btn.ghost:hover{color:#ff8585;border-color:#ff8585;}
  .savestate{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted-2);margin-left:auto;}

  details.res{margin-bottom:16px;border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden;}
  details.res > summary{list-style:none;cursor:pointer;padding:13px 15px;font-size:13.5px;font-weight:600;
    display:flex;align-items:center;gap:9px;color:var(--txt);}
  details.res > summary::-webkit-details-marker{display:none;}
  details.res > summary .ico{color:var(--cyan);}
  details.res .reslist{padding:2px 15px 14px;display:grid;gap:8px;}
  details.res a{color:var(--txt);text-decoration:none;font-size:13px;display:flex;align-items:center;justify-content:space-between;
    gap:10px;padding:9px 11px;border-radius:9px;background:var(--card-2);border:1px solid var(--line);transition:border-color .15s;}
  details.res a:hover{border-color:var(--cyan);}
  details.res a span{color:var(--muted);font-size:11px;}

  .domain{margin-bottom:12px;border:1px solid var(--line);border-radius:16px;background:var(--card);box-shadow:var(--shadow);overflow:hidden;}
  .dhead{width:100%;text-align:left;cursor:pointer;border:0;background:transparent;color:inherit;
    padding:15px 16px;display:flex;align-items:center;gap:13px;font-family:inherit;}
  .dnum{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;color:var(--cyan);width:30px;height:30px;flex:none;
    display:grid;place-items:center;border:1px solid var(--line-strong);border-radius:9px;background:#0c1726;}
  .dmeta{flex:1;min-width:0;}
  .dname{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15.5px;letter-spacing:-.01em;}
  .dsub{display:flex;align-items:center;gap:10px;margin-top:5px;}
  .weight{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--amber);background:rgba(245,177,76,.1);
    border:1px solid rgba(245,177,76,.22);padding:2px 7px;border-radius:6px;}
  .dprog{flex:1;height:5px;border-radius:3px;background:#0a1422;overflow:hidden;max-width:150px;}
  .dprog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--teal));transition:width .5s ease;}
  .dcount{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);}
  .chev{transition:transform .25s ease;color:var(--muted);flex:none;}
  .domain.open .chev{transform:rotate(90deg);}
  .dbody{display:none;padding:0 16px 8px;}
  .domain.open .dbody{display:block;}
  .project{font-size:12.5px;color:var(--muted);background:var(--card-2);border:1px dashed var(--line-strong);
    border-radius:10px;padding:10px 12px;margin:0 0 6px;}
  .project b{color:var(--teal);font-weight:600;font-family:"JetBrains Mono",monospace;font-size:10.5px;
    letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:3px;}

  .topic{border-top:1px solid var(--line);}
  .thead{display:flex;align-items:center;gap:11px;padding:12px 0;cursor:pointer;}
  .pill{flex:none;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:9.5px;font-weight:700;
    letter-spacing:.06em;text-transform:uppercase;border-radius:20px;padding:5px 0;width:78px;text-align:center;
    border:1px solid var(--line-strong);background:#0c1726;color:var(--muted);transition:all .2s ease;user-select:none;}
  .pill:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}
  .pill[data-s="1"]{color:var(--amber);border-color:rgba(245,177,76,.4);background:rgba(245,177,76,.09);animation:pulse 2s ease-in-out infinite;}
  .pill[data-s="2"]{color:var(--teal);border-color:rgba(45,212,167,.45);background:rgba(45,212,167,.12);}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,177,76,0);}50%{box-shadow:0 0 0 4px rgba(245,177,76,.08);}}
  .tname{flex:1;min-width:0;font-size:13.5px;}
  .topic.done .tname{color:var(--muted);}
  .tchev{transition:transform .25s ease;color:var(--muted-2);flex:none;font-size:15px;}
  .topic.open .tchev{transform:rotate(90deg);}

  .detail{display:none;padding:2px 0 14px 0;}
  .topic.open .detail{display:block;}
  .sum{font-size:13.5px;color:var(--txt);margin:0 0 10px;line-height:1.55;}
  .keys{margin:0 0 11px;padding:0;list-style:none;display:grid;gap:7px;}
  .keys li{font-size:13px;color:#cfdaea;line-height:1.5;padding-left:18px;position:relative;}
  .keys li::before{content:"▸";position:absolute;left:0;color:var(--cyan);font-size:11px;top:1px;}
  .aws,.tip{font-size:12.5px;line-height:1.55;border-radius:10px;padding:9px 12px;margin:0 0 9px;}
  .aws{background:rgba(56,182,240,.07);border:1px solid rgba(56,182,240,.2);color:#cfe7fb;}
  .tip{background:rgba(245,177,76,.07);border:1px solid rgba(245,177,76,.22);color:#f4e2c4;}
  .aws b,.tip b{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;
    display:inline-block;margin-right:7px;}
  .aws b{color:var(--cyan);} .tip b{color:var(--amber);}
  .dfoot{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:4px;}
  .learn{color:var(--cyan);text-decoration:none;font-size:12px;font-weight:500;}
  .learn:hover{text-decoration:underline;}
  .noteBtn{background:none;border:0;color:var(--muted-2);cursor:pointer;font-size:12px;padding:0;font-family:inherit;}
  .noteBtn:hover{color:var(--cyan);}
  .noteWrap{display:none;margin-top:9px;}
  .noteWrap.open{display:block;}
  textarea{width:100%;background:#0a1422;border:1px solid var(--line);border-radius:8px;color:var(--txt);
    font-family:"JetBrains Mono",monospace;font-size:12px;padding:8px 10px;resize:vertical;min-height:46px;line-height:1.5;}
  textarea::placeholder{color:var(--muted-2);} textarea:focus{outline:none;border-color:var(--cyan);}

  footer{margin-top:24px;text-align:center;color:var(--muted-2);font-size:12px;line-height:1.6;}
  footer b{color:var(--muted);}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
  @media (max-width:480px){h1{font-size:22px;}.meter .count{font-size:28px;}.dprog{display:none;}.pill{width:70px;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <p class="eyebrow"><span class="dot"></span> AZ-104 · Azure Administrator</p>
    <h1>Study Guide &amp; Tracker</h1>
    <div class="meter">
      <div class="count"><span id="doneN">0</span><small>/<span id="totalN">0</span> topics</small></div>
      <div class="pct"><span id="pctN">0</span>%</div>
    </div>
    <div class="bar"><span id="overallBar"></span></div>
    <div class="chips" id="chips"></div>
  </header>

  <div class="toolbar">
    <label class="search"><span class="mi">⌕</span><input id="searchInput" type="text" placeholder="Search topics…" autocomplete="off"></label>
    <button class="btn" id="hideBtn">Hide done</button>
    <button class="btn" id="expandBtn">Expand all</button>
    <button class="btn ghost" id="resetBtn">Reset</button>
    <span class="savestate" id="saveState"></span>
  </div>

  <details class="res">
    <summary><span class="ico">◆</span> Best resources &amp; lab links</summary>
    <div class="reslist" id="resList"></div>
  </details>

  <main id="domains"></main>

  <footer>
    Tap a topic to study it · tap the status to cycle <b>To do → Learning → Done</b>.<br>
    Build each domain's project step as you go — don't just read it.
  </footer>
</div>

<script>
/* ===== Resources ===== */
const RES = [
  ["Official study guide (skills measured)","learn.microsoft.com","https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/az-104"],
  ["Microsoft practice assessment (free)","learn.microsoft.com","https://learn.microsoft.com/en-us/credentials/certifications/practice-assessments-for-microsoft-certifications"],
  ["Official hands-on lab guides","microsoftlearning.github.io","https://microsoftlearning.github.io/AZ-104-MicrosoftAzureAdministrator/"],
  ["John Savill — AZ-104 Study Cram","youtube.com","https://www.youtube.com/watch?v=0Knf9nub4-k"],
  ["Azure free account ($200 credit)","azure.microsoft.com","https://azure.microsoft.com/free"]
];

/* ===== Study content ===== */
const DOMAINS = [
{ n:1, name:"Identities & Governance", weight:"20-25%",
  project:"Stand up Contoso's tenant, sync on-prem AD with Entra Connect, then lock it down with RBAC and Azure Policy.",
  T:[
   {t:"Entra ID tenants & users",
    s:"Entra ID (formerly Azure AD) is Azure's cloud identity provider; a tenant is one dedicated instance for your org.",
    k:["A subscription trusts exactly one Entra tenant, but one tenant can hold many subscriptions.","User types: Member (internal) vs Guest (B2B, invited externally).","Create users via portal, PowerShell (New-MgUser), CLI, or bulk CSV.","Deleted users are restorable for 30 days."],
    aws:"Like an account's IAM directory, but identity is org-wide and decoupled from billing/subscriptions.",
    tip:"Identity (Entra ID) and authorization (Azure RBAC) are SEPARATE in Azure — unlike AWS IAM which combines them."},
   {t:"Groups: security vs M365 & dynamic",
    s:"Groups bundle users so you assign access once instead of per-user.",
    k:["Security groups grant access to resources/apps; Microsoft 365 groups are for collaboration.","Membership is Assigned (manual) or Dynamic (rule-based on attributes).","Dynamic membership requires an Entra ID P1 license.","Dynamic groups cannot contain other groups."],
    aws:"Like IAM groups, plus dynamic, attribute-based membership that AWS has no direct equivalent for.",
    tip:"Dynamic groups = P1. A frequently tested licensing dependency."},
   {t:"Self-service password reset (SSPR)",
    s:"Lets users reset their own password without calling the helpdesk.",
    k:["Scope is None, a Selected group, or All users.","Requires registered methods: authenticator app, email, phone, or questions.","You set how many methods are required to reset.","Cloud-only SSPR is free; password writeback to on-prem AD needs P1."],
    tip:"Writeback to on-prem AD requires P1 + Entra Connect — cloud-only reset does not."},
   {t:"Entra licenses (Free / P1 / P2)",
    s:"Identity features are gated by license tier — map each feature to its tier.",
    k:["Free: users, groups, SSO, security defaults.","P1: Conditional Access, dynamic groups, SSPR writeback, group-based licensing.","P2: everything in P1 plus Identity Protection, PIM, and access reviews."],
    tip:"Conditional Access = P1. PIM and Identity Protection = P2. Memorize this split."},
   {t:"Conditional Access & MFA",
    s:"Policies that allow or block access based on signals like user, device, location, and risk.",
    k:["Built from Assignments (users, apps, conditions) + Access controls (grant/block, require MFA).","Requires P1; risk-based conditions require P2.","Security Defaults = free, all-or-nothing MFA; CA = granular control.","Typical rule: require MFA for admins or untrusted locations."],
    aws:"Conceptually like IAM condition keys plus enforced MFA, but identity-centric and policy-driven.",
    tip:"You cannot run Security Defaults and Conditional Access at the same time."},
   {t:"Hybrid identity: Entra Connect / Cloud Sync",
    s:"Synchronize on-prem Active Directory identities into Entra ID — your project centerpiece.",
    k:["Entra Connect (server-based sync engine) vs Cloud Sync (lightweight agent, multi-forest).","Sign-in methods: Password Hash Sync (PHS), Pass-through Auth (PTA), Federation (AD FS).","PHS is the common, recommended default; Seamless SSO signs users in on the corp network."],
    aws:"Like AWS Directory Service / AD Connector bridging on-prem AD to the cloud.",
    tip:"Know when to choose PHS vs PTA vs Federation — a classic scenario question."},
   {t:"RBAC: built-in & custom roles",
    s:"Azure RBAC controls what an identity can DO to Azure resources.",
    k:["Four core roles: Owner (full + manage access), Contributor (full except access), Reader (view), User Access Administrator (access only).","A role is a JSON set of Actions / NotActions / DataActions.","Build custom roles when no built-in fits; up to 5000 per tenant."],
    aws:"Like IAM roles/policies, but RBAC is separate from the identity store (Entra ID).",
    tip:"Contributor can do everything EXCEPT grant access — the key distractor versus Owner."},
   {t:"RBAC scope, inheritance & deny assignments",
    s:"Where you assign a role determines how far its permissions reach.",
    k:["Scope hierarchy: Management group → Subscription → Resource group → Resource.","Assignments inherit downward (assign at the RG, it covers all resources inside).","Effective access is the additive UNION of all assignments.","Deny assignments override allows but are system-created, not user-made."],
    tip:"RBAC is purely additive — there is no user-created 'deny' role."},
   {t:"Management groups & subscriptions",
    s:"Management groups organize many subscriptions into a governable hierarchy.",
    k:["Apply RBAC and Azure Policy at the MG level and it inherits to all child subs.","Up to 6 levels deep (excluding the root); one root MG per tenant.","Every subscription belongs to exactly one MG; subs can be moved."],
    aws:"Like AWS Organizations with OUs.",
    tip:"Use MGs to apply governance ONCE across many subscriptions."},
   {t:"Azure Policy & initiatives",
    s:"Enforces organizational standards and compliance on resource configurations.",
    k:["Effects: Deny, Audit, Append, Modify, DeployIfNotExists, AuditIfNotExists.","An initiative is a bundle of related policies assigned together.","Modify and DeployIfNotExists need a managed identity to remediate.","Assigned at MG, subscription, or RG scope."],
    aws:"Like SCPs and AWS Config rules combined.",
    tip:"Policy controls WHAT configs are allowed; RBAC controls WHO can act. Don't mix them up."},
   {t:"Resource locks & tags",
    s:"Locks prevent accidental changes; tags add metadata for organization and cost tracking.",
    k:["Lock types: CanNotDelete (edit but not delete) and ReadOnly (no edit or delete).","Locks inherit to child resources and apply over RBAC.","Even an Owner must remove a lock before deleting.","Tags are name/value pairs and are NOT inherited by default."],
    tip:"A ReadOnly lock can block operations you'd expect to work, like listing storage keys."},
   {t:"Cost management & budgets",
    s:"Track and alert on spend across scopes.",
    k:["Budgets fire alerts at thresholds — they do NOT stop spending.","Cost analysis breaks spend down by resource, RG, or tag.","Action groups can notify or trigger automation on a budget alert."],
    tip:"A budget only alerts; it never caps or shuts down resources."}
  ]},
{ n:2, name:"Storage", weight:"15-20%",
  project:"Create Contoso's storage account: blob containers with lifecycle rules, a mounted file share, and a scoped SAS token.",
  T:[
   {t:"Storage accounts & performance tiers",
    s:"A storage account is the namespace wrapping Blob, Files, Queue, and Table services.",
    k:["General-purpose v2 is the standard recommendation; Premium = SSD for low latency.","Account name is globally unique, 3-24 lowercase letters and numbers.","Performance: Standard (HDD) vs Premium (SSD).","One account can host blobs, file shares, queues, and tables."],
    aws:"Loosely wraps S3 + EFS + queues under one named namespace.",
    tip:"GPv2 is the default answer unless the scenario demands high IOPS (then Premium)."},
   {t:"Redundancy: LRS / ZRS / GRS / GZRS",
    s:"Replication options trade cost against durability and geographic protection.",
    k:["LRS: 3 copies in one datacenter (cheapest).","ZRS: 3 copies across availability zones in one region.","GRS: LRS plus async copy to a paired secondary region.","GZRS: ZRS plus geo-replication. RA- variants add read access to the secondary."],
    tip:"Region outage protection → GRS/GZRS. Zone/datacenter failure within a region → ZRS."},
   {t:"Blob storage & access tiers",
    s:"Object storage with tiers that trade access speed for cost.",
    k:["Blob types: Block (files), Append (logs), Page (VHDs/disks).","Tiers: Hot, Cool (30+ days), Cold (90+ days), Archive (offline, 180+ days).","Tier set as an account default or per blob.","Archive blobs must be rehydrated before reading (takes hours)."],
    aws:"Like S3 storage classes (Standard / IA / Glacier).",
    tip:"Archive is not instantly readable; Cool/Cold carry early-deletion penalties."},
   {t:"Blob lifecycle management",
    s:"Rule-based automation that tiers down or deletes blobs by age.",
    k:["Example: move to Cool after 30 days, Archive after 90, delete after 365.","Triggers on last-modified or last-accessed time.","Defined as a JSON policy on the account."],
    tip:"Lifecycle management is the answer to automated cost optimization and cleanup."},
   {t:"Azure Files & File Sync",
    s:"Fully managed SMB/NFS file shares you can mount cross-platform.",
    k:["SMB shares support AD DS or Entra DS identity-based auth.","Azure File Sync caches shares on on-prem Windows Servers with cloud tiering.","Good for lift-and-shift file servers and shared app config."],
    aws:"Like Amazon EFS / FSx.",
    tip:"Files (mountable SMB drive) vs Blob (object via REST) — pick correctly per scenario."},
   {t:"SAS tokens & access keys",
    s:"Ways to grant access to storage without exposing the full account keys.",
    k:["Two account keys give full access; rotate them regularly.","A SAS is delegated, scoped, time-limited access.","SAS types: User delegation (Entra-backed, most secure), Service, Account.","SAS defines permissions, expiry, and allowed IPs/protocols."],
    tip:"Prefer a user delegation SAS (signed with Entra creds) over key-based SAS."},
   {t:"Storage security & firewalls",
    s:"Lock down who can reach the storage account.",
    k:["Restrict the public endpoint via firewall (allow specific VNets/IPs).","A Private Endpoint gives the account a private IP in your VNet.","Encryption at rest is on by default (Microsoft- or customer-managed keys).","'Secure transfer required' forces HTTPS."],
    tip:"To make storage reachable only from a VNet → service/private endpoint + deny public access."},
   {t:"AzCopy & Storage Explorer",
    s:"Tools for moving and managing storage data.",
    k:["AzCopy: command-line tool for high-performance bulk copy/sync.","Storage Explorer: GUI to manage all storage services.","Both authenticate via Entra or SAS."],
    tip:"AzCopy is the go-to answer for scripted or bulk data transfer."},
   {t:"Versioning & object replication",
    s:"Data-protection features for blobs.",
    k:["Blob versioning auto-keeps prior versions on overwrite/delete.","Soft delete recovers deleted blobs/containers within a retention window.","Object replication copies block blobs async between accounts (needs versioning).","Snapshots are manual point-in-time copies."],
    tip:"Soft delete plus versioning are the standard data-protection answers."}
  ]},
{ n:3, name:"Compute", weight:"20-25%",
  project:"Deploy the web tier: VMs across zones → convert to a VMSS with autoscale → an App Service with a staging slot.",
  T:[
   {t:"VM creation & sizing",
    s:"Provision IaaS virtual machines and choose the right size and purchasing model.",
    k:["Families: B (burstable), D (general), E (memory), F (compute), N (GPU).","Pricing: Pay-as-you-go, Reserved (1/3-yr discount), Spot (cheap, evictable).","Resizing may require a stop if the new size needs different hardware.","Generalized images (sysprepped) are used as templates."],
    aws:"Like EC2 instance types and On-Demand/Reserved/Spot purchasing.",
    tip:"Spot VMs can be evicted anytime — interruptible workloads only. Use B-series for cheap labs."},
   {t:"Managed disks & encryption",
    s:"Azure-managed block storage attached to VMs.",
    k:["Types: Ultra, Premium SSD, Standard SSD, Standard HDD.","OS disk, data disks, and an ephemeral temp disk.","SSE encrypts at rest by default; Azure Disk Encryption adds in-guest BitLocker/DM-Crypt.","Managed disks handle storage placement for you."],
    aws:"Like EBS volumes.",
    tip:"The temp disk (D: on Windows) is WIPED on deallocate/resize — never store data there."},
   {t:"Availability sets vs zones",

/* ===== State + persistence (auto-detects Claude vs self-hosted) ===== */
const KEY="az104-progress-v1";
let state={}; let backend="memory"; let saveTimer=null;
function tid(d,i){return "d"+d+"t"+i;}
function savedLabel(){return backend==="memory"?"session only":backend==="local"?"saved · this browser":"saved ✓";}
async function loadState(){
  if(typeof window.storage!=="undefined" && window.storage && typeof window.storage.get==="function"){
    backend="claude";
    try{const r=await window.storage.get(KEY); if(r&&r.value) state=JSON.parse(r.value);}catch(e){}
    return;
  }
  try{ if(typeof localStorage!=="undefined"){ backend="local"; const v=localStorage.getItem(KEY); if(v) state=JSON.parse(v); return; } }catch(e){}
  backend="memory";
}
function persist(){
  try{ if(backend==="claude") return window.storage.set(KEY,JSON.stringify(state));
       if(backend==="local") localStorage.setItem(KEY,JSON.stringify(state)); }catch(e){}
  return Promise.resolve();
}
function scheduleSave(){
  const el=document.getElementById("saveState");
  if(backend==="memory"){el.textContent="session only";return;}
  el.textContent="saving…"; clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{ try{await persist(); el.textContent=savedLabel();}catch(e){el.textContent="save failed";} },350);
}
function getS(id){return (state[id]&&state[id].s)||0;}

/* ===== Render ===== */
const STATUS=["To do","Learning","Done"];
let total=0; DOMAINS.forEach(d=>total+=d.T.length);
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function build(){
  document.getElementById("resList").innerHTML=RES.map(r=>
    `<a href="${r[2]}" target="_blank" rel="noopener">${r[0]}<span>${r[1]} ↗</span></a>`).join("");

  document.getElementById("chips").innerHTML=DOMAINS.map((d,di)=>
    `<div class="chip">D${d.n}<b id="chip${di}">0/${d.T.length}</b><div class="seg"><i id="seg${di}"></i></div></div>`).join("");

  document.getElementById("domains").innerHTML=DOMAINS.map((d,di)=>{
    const rows=d.T.map((tp,ti)=>{
      const id=tid(d.n,ti); const s=getS(id);
      const note=(state[id]&&state[id].note)||"";
      const q=encodeURIComponent(tp.t+" azure");
      const keys=tp.k.map(x=>`<li>${x}</li>`).join("");
      const aws=tp.aws?`<p class="aws"><b>From AWS</b>${tp.aws}</p>`:"";
      const tip=tp.tip?`<p class="tip"><b>Exam tip</b>${tp.tip}</p>`:"";
      return `<div class="topic ${s===2?'done':''}" data-id="${id}" data-name="${tp.t.toLowerCase()}">
        <div class="thead">
          <button class="pill" data-s="${s}" aria-label="Status: ${STATUS[s]}">${STATUS[s]}</button>
          <span class="tname">${tp.t}</span>
          <span class="tchev">›</span>
        </div>
        <div class="detail">
          <p class="sum">${tp.s}</p>
          <ul class="keys">${keys}</ul>
          ${aws}${tip}
          <div class="dfoot">
            <a class="learn" href="https://learn.microsoft.com/en-us/search/?terms=${q}" target="_blank" rel="noopener">Open in Microsoft Learn ↗</a>
            <button class="noteBtn">${note?'✎ note':'+ note'}</button>
          </div>
          <div class="noteWrap"><textarea placeholder="Jot a fact to look up during the open-book exam…">${esc(note)}</textarea></div>
        </div>
      </div>`;
    }).join("");
    return `<section class="domain" data-di="${di}">
      <button class="dhead" aria-expanded="false">
        <span class="dnum">${String(d.n).padStart(2,"0")}</span>
        <span class="dmeta"><span class="dname">${d.name}</span>
          <span class="dsub"><span class="weight">${d.weight}</span>
            <span class="dprog"><i id="dp${di}"></i></span>
            <span class="dcount" id="dc${di}">0/${d.T.length}</span></span></span>
        <span class="chev">›</span>
      </button>
      <div class="dbody"><p class="project"><b>Project step</b>${d.project}</p>${rows}</div>
    </section>`;
  }).join("");

  wire(); refresh(); applyFilters();
}

function wire(){
  document.querySelectorAll(".dhead").forEach(h=>h.addEventListener("click",()=>{
    const sec=h.closest(".domain"); const open=sec.classList.toggle("open"); h.setAttribute("aria-expanded",open);
  }));
  document.querySelectorAll(".thead").forEach(th=>th.addEventListener("click",e=>{
    if(e.target.closest(".pill")) return;
    th.closest(".topic").classList.toggle("open");
  }));
  document.querySelectorAll(".pill").forEach(p=>p.addEventListener("click",e=>{
    e.stopPropagation();
    const row=p.closest(".topic"); const id=row.dataset.id; const ns=(getS(id)+1)%3;
    state[id]=state[id]||{s:0,note:""}; state[id].s=ns;
    p.dataset.s=ns; p.textContent=STATUS[ns]; p.setAttribute("aria-label","Status: "+STATUS[ns]);
    row.classList.toggle("done",ns===2);
    scheduleSave(); refresh(); applyFilters();
  }));
  document.querySelectorAll(".noteBtn").forEach(b=>b.addEventListener("click",()=>{
    b.closest(".detail").querySelector(".noteWrap").classList.toggle("open");
  }));
  document.querySelectorAll("textarea").forEach(ta=>ta.addEventListener("input",()=>{
    const id=ta.closest(".topic").dataset.id; state[id]=state[id]||{s:0,note:""}; state[id].note=ta.value;
    ta.closest(".detail").querySelector(".noteBtn").textContent=ta.value?"✎ note":"+ note";
    scheduleSave();
  }));
}

function refresh(){
  let done=0;
  DOMAINS.forEach((d,di)=>{
    let dd=0; d.T.forEach((tp,ti)=>{if(getS(tid(d.n,ti))===2)dd++;});
    done+=dd; const pct=Math.round(dd/d.T.length*100);
    document.getElementById("dp"+di).style.width=pct+"%";
    document.getElementById("dc"+di).textContent=dd+"/"+d.T.length;
    document.getElementById("seg"+di).style.width=pct+"%";
    document.getElementById("chip"+di).textContent=dd+"/"+d.T.length;
  });
  const pct=Math.round(done/total*100);
  document.getElementById("doneN").textContent=done;
  document.getElementById("totalN").textContent=total;
  document.getElementById("pctN").textContent=pct;
  document.getElementById("overallBar").style.width=pct+"%";
}

/* ===== Filters (search + hide done) ===== */
const searchInput=document.getElementById("searchInput");
function applyFilters(){
  const term=(searchInput.value||"").trim().toLowerCase();
  const hide=document.body.classList.contains("hiding");
  document.querySelectorAll(".domain").forEach(sec=>{
    let any=false;
    sec.querySelectorAll(".topic").forEach(row=>{
      let vis=true;
      if(term && row.dataset.name.indexOf(term)===-1) vis=false;
      if(hide && row.classList.contains("done")) vis=false;
      row.style.display=vis?"block":"none";
      if(vis) any=true;
    });
    sec.style.display=any?"block":"none";
    if(term && any){ sec.classList.add("open"); sec.querySelector(".dhead").setAttribute("aria-expanded","true"); }
  });
}
searchInput.addEventListener("input",applyFilters);

document.getElementById("hideBtn").addEventListener("click",function(){
  const on=document.body.classList.toggle("hiding");
  this.classList.toggle("toggled",on); this.textContent=on?"Show all":"Hide done"; applyFilters();
});
document.getElementById("expandBtn").addEventListener("click",function(){
  const secs=document.querySelectorAll(".domain");
  const anyClosed=[...secs].some(s=>!s.classList.contains("open"));
  secs.forEach(s=>{s.classList.toggle("open",anyClosed); s.querySelector(".dhead").setAttribute("aria-expanded",anyClosed);});
  this.textContent=anyClosed?"Collapse all":"Expand all";
});
document.getElementById("resetBtn").addEventListener("click",async function(){
  if(!confirm("Reset all progress and notes? This cannot be undone.")) return;
  state={};
  try{ if(backend==="claude") await window.storage.delete(KEY); else if(backend==="local") localStorage.removeItem(KEY); }catch(e){}
  build(); document.getElementById("saveState").textContent=backend==="memory"?"session only":"reset ✓";
});

(async function(){ await loadState(); build(); document.getElementById("saveState").textContent=savedLabel(); })();
</script>
