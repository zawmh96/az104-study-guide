<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AZ-104 Study Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1320;
    --bg-glow:#13243b;
    --card:#131f30;
    --card-2:#172538;
    --line:rgba(255,255,255,.07);
    --line-strong:rgba(255,255,255,.13);
    --txt:#e7eef8;
    --muted:#8597ad;
    --muted-2:#5f7187;
    --cyan:#38b6ff;
    --teal:#2dd4a7;
    --amber:#f5b14c;
    --shadow:0 18px 50px -20px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 540px at 50% -160px, var(--bg-glow), transparent 70%),
      var(--bg);
    color:var(--txt);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    line-height:1.5;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px 80px;}

  /* ---------- Hero ---------- */
  .hero{
    position:sticky;top:0;z-index:30;
    margin:0 -16px 18px;padding:18px 16px 16px;
    background:linear-gradient(180deg, rgba(11,19,32,.96) 70%, rgba(11,19,32,0));
    backdrop-filter:blur(8px);
  }
  .eyebrow{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--cyan);margin:0 0 6px;
    display:flex;align-items:center;gap:8px;
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px var(--teal);}
  h1{
    font-family:"Space Grotesk",sans-serif;font-weight:700;
    font-size:26px;line-height:1.1;margin:0 0 14px;letter-spacing:-.01em;
  }
  .meter{
    display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:10px;
  }
  .meter .count{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:34px;line-height:1;letter-spacing:-.02em;}
  .meter .count small{font-size:15px;color:var(--muted);font-weight:500;}
  .meter .pct{font-family:"JetBrains Mono",monospace;font-size:13px;color:var(--teal);background:rgba(45,212,167,.1);border:1px solid rgba(45,212,167,.25);padding:4px 9px;border-radius:8px;}
  .bar{height:9px;border-radius:6px;background:#0a1422;border:1px solid var(--line);overflow:hidden;position:relative;}
  .bar > span{
    display:block;height:100%;width:0;border-radius:5px;
    background:linear-gradient(90deg,var(--cyan),var(--teal));
    transition:width .55s cubic-bezier(.22,1,.36,1);
    position:relative;
  }
  .bar > span::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
    transform:translateX(-100%);animation:shimmer 2.4s linear infinite;
  }
  @keyframes shimmer{to{transform:translateX(100%);}}
  .chips{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
  .chip{
    flex:1 1 0;min-width:54px;font-family:"JetBrains Mono",monospace;font-size:10.5px;
    color:var(--muted);background:var(--card);border:1px solid var(--line);
    border-radius:9px;padding:7px 6px;text-align:center;
  }
  .chip b{display:block;color:var(--txt);font-size:12px;margin-top:2px;}
  .chip .seg{height:3px;border-radius:2px;background:#0a1422;margin-top:6px;overflow:hidden;}
  .chip .seg > i{display:block;height:100%;background:var(--cyan);width:0;transition:width .5s ease;}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .btn{
    font-family:"Inter",sans-serif;font-size:13px;font-weight:500;cursor:pointer;
    background:var(--card);color:var(--txt);border:1px solid var(--line-strong);
    border-radius:10px;padding:8px 13px;display:inline-flex;align-items:center;gap:7px;
    transition:border-color .15s ease,background .15s ease;
  }
  .btn:hover{border-color:var(--cyan);}
  .btn.toggled{background:rgba(56,182,240,.12);border-color:var(--cyan);color:var(--cyan);}
  .btn.ghost{background:transparent;color:var(--muted);}
  .btn.ghost:hover{color:#ff8585;border-color:#ff8585;}
  .spacer{flex:1;}
  .savestate{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--muted-2);}

  /* ---------- Resources ---------- */
  details.res{margin-bottom:18px;border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden;}
  details.res > summary{
    list-style:none;cursor:pointer;padding:13px 15px;font-size:13.5px;font-weight:600;
    display:flex;align-items:center;gap:9px;color:var(--txt);
  }
  details.res > summary::-webkit-details-marker{display:none;}
  details.res > summary .ico{color:var(--cyan);}
  details.res .reslist{padding:2px 15px 14px;display:grid;gap:8px;}
  details.res a{
    color:var(--txt);text-decoration:none;font-size:13px;display:flex;align-items:center;
    justify-content:space-between;gap:10px;padding:9px 11px;border-radius:9px;
    background:var(--card-2);border:1px solid var(--line);transition:border-color .15s;
  }
  details.res a:hover{border-color:var(--cyan);}
  details.res a span{color:var(--muted);font-size:11px;}

  /* ---------- Domains ---------- */
  .domain{margin-bottom:12px;border:1px solid var(--line);border-radius:16px;background:var(--card);box-shadow:var(--shadow);overflow:hidden;}
  .dhead{
    width:100%;text-align:left;cursor:pointer;border:0;background:transparent;color:inherit;
    padding:15px 16px;display:flex;align-items:center;gap:13px;font-family:inherit;
  }
  .dnum{
    font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:700;color:var(--cyan);
    width:30px;height:30px;flex:none;display:grid;place-items:center;
    border:1px solid var(--line-strong);border-radius:9px;background:#0c1726;
  }
  .dmeta{flex:1;min-width:0;}
  .dname{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:15.5px;letter-spacing:-.01em;}
  .dsub{display:flex;align-items:center;gap:10px;margin-top:5px;}
  .weight{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--amber);background:rgba(245,177,76,.1);border:1px solid rgba(245,177,76,.22);padding:2px 7px;border-radius:6px;}
  .dprog{flex:1;height:5px;border-radius:3px;background:#0a1422;overflow:hidden;max-width:160px;}
  .dprog > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--teal));transition:width .5s ease;}
  .dcount{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted);}
  .chev{transition:transform .25s ease;color:var(--muted);flex:none;}
  .domain.open .chev{transform:rotate(90deg);}

  .dbody{display:none;padding:0 16px 6px;}
  .domain.open .dbody{display:block;}
  .project{
    font-size:12.5px;color:var(--muted);background:var(--card-2);border:1px dashed var(--line-strong);
    border-radius:10px;padding:10px 12px;margin:0 0 12px;
  }
  .project b{color:var(--teal);font-weight:600;font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:3px;}

  /* ---------- Topic rows ---------- */
  .topic{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-top:1px solid var(--line);}
  .topic:first-child{border-top:0;}
  .topic.done .tname{color:var(--muted);}
  .topic.done .tname .label{text-decoration:line-through;text-decoration-color:var(--muted-2);}
  .pill{
    flex:none;margin-top:1px;cursor:pointer;font-family:"JetBrains Mono",monospace;
    font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    border-radius:20px;padding:5px 0;width:78px;text-align:center;
    border:1px solid var(--line-strong);background:#0c1726;color:var(--muted);
    transition:all .2s ease;user-select:none;
  }
  .pill:focus-visible{outline:2px solid var(--cyan);outline-offset:2px;}
  .pill[data-s="1"]{color:var(--amber);border-color:rgba(245,177,76,.4);background:rgba(245,177,76,.09);animation:pulse 2s ease-in-out infinite;}
  .pill[data-s="2"]{color:var(--teal);border-color:rgba(45,212,167,.45);background:rgba(45,212,167,.12);animation:none;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,177,76,.0);}50%{box-shadow:0 0 0 4px rgba(245,177,76,.08);}}
  .tbody{flex:1;min-width:0;}
  .tname{font-size:13.5px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .tname a{color:var(--cyan);text-decoration:none;font-size:11px;font-weight:500;white-space:nowrap;opacity:.85;}
  .tname a:hover{opacity:1;text-decoration:underline;}
  .noteBtn{background:none;border:0;color:var(--muted-2);cursor:pointer;font-size:11px;padding:0;font-family:inherit;}
  .noteBtn:hover{color:var(--cyan);}
  .noteWrap{display:none;margin-top:8px;}
  .noteWrap.open{display:block;}
  textarea{
    width:100%;background:#0a1422;border:1px solid var(--line);border-radius:8px;color:var(--txt);
    font-family:"JetBrains Mono",monospace;font-size:12px;padding:8px 10px;resize:vertical;min-height:48px;line-height:1.5;
  }
  textarea::placeholder{color:var(--muted-2);}
  textarea:focus{outline:none;border-color:var(--cyan);}

  footer{margin-top:26px;text-align:center;color:var(--muted-2);font-size:12px;line-height:1.6;}
  footer b{color:var(--muted);}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }
  @media (max-width:480px){
    h1{font-size:22px;}
    .meter .count{font-size:30px;}
    .dprog{display:none;}
    .pill{width:70px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="hero">
    <p class="eyebrow"><span class="dot"></span> AZ-104 · Azure Administrator</p>
    <h1>Study Console</h1>
    <div class="meter">
      <div class="count"><span id="doneN">0</span><small>/<span id="totalN">0</span> topics</small></div>
      <div class="pct"><span id="pctN">0</span>%</div>
    </div>
    <div class="bar"><span id="overallBar"></span></div>
    <div class="chips" id="chips"></div>
  </header>

  <div class="toolbar">
    <button class="btn" id="hideBtn">Hide completed</button>
    <button class="btn" id="expandBtn">Expand all</button>
    <span class="spacer"></span>
    <span class="savestate" id="saveState"></span>
    <button class="btn ghost" id="resetBtn">Reset</button>
  </div>

  <details class="res">
    <summary><span class="ico">◆</span> Best resources &amp; lab links</summary>
    <div class="reslist" id="resList"></div>
  </details>

  <main id="domains"></main>

  <footer>
    Tap a status to cycle <b>To do → Learning → Done</b>. Use each topic's note as your
    open-book <b>lookup index</b>.<br>Work the topics alongside your <b>Contoso Hybrid Cloud</b> project — build it, don't just read it.
  </footer>

</div>

<script>
/* ---------------- Data ---------------- */
const RES = [
  ["Official study guide (skills measured)","learn.microsoft.com","https://learn.microsoft.com/en-us/credentials/certifications/resources/study-guides/az-104"],
  ["Microsoft practice assessment (free)","learn.microsoft.com","https://learn.microsoft.com/en-us/credentials/certifications/practice-assessments-for-microsoft-certifications"],
  ["Official hands-on lab guides","microsoftlearning.github.io","https://microsoftlearning.github.io/AZ-104-MicrosoftAzureAdministrator/"],
  ["John Savill — AZ-104 Study Cram","youtube.com","https://www.youtube.com/watch?v=0Knf9nub4-k"],
  ["Azure free account ($200 credit)","azure.microsoft.com","https://azure.microsoft.com/free"]
];

const DOMAINS = [
  { n:1, name:"Identities & Governance", weight:"20–25%",
    project:"Stand up Contoso's tenant, sync on-prem AD via Entra Connect, then lock it down with RBAC + Azure Policy.",
    topics:["Entra ID tenants & users","Groups: security vs M365 & dynamic","Self-service password reset (SSPR)","Entra licenses (Free / P1 / P2)","Conditional Access & MFA","Hybrid identity: Entra Connect / Cloud Sync","RBAC: built-in & custom roles","RBAC scope, inheritance & deny assignments","Management groups & subscriptions","Azure Policy & initiatives","Resource locks & tags","Cost management & budgets"] },
  { n:2, name:"Storage", weight:"15–20%",
    project:"Create Contoso's storage account: blob containers with lifecycle rules, a mounted file share, and a scoped SAS token.",
    topics:["Storage accounts & performance tiers","Redundancy: LRS / ZRS / GRS / GZRS","Blob storage & access tiers","Blob lifecycle management","Azure Files & File Sync","SAS tokens & access keys","Storage security & firewalls","AzCopy & Storage Explorer","Versioning & object replication"] },
  { n:3, name:"Compute", weight:"20–25%",
    project:"Deploy the web tier: VMs across availability zones → convert to a VMSS with autoscale → App Service with a staging slot.",
    topics:["VM creation & sizing","Managed disks & encryption","Availability sets vs zones","VM extensions & custom script","VM Scale Sets & autoscale","App Service plans & scaling","Deployment slots & slot swap","Container Instances & Container Apps","AKS basics","ARM templates & Bicep","Deployment stacks"] },
  { n:4, name:"Virtual Networking", weight:"15–20%",
    project:"Build hub-and-spoke VNets, peer them, guard traffic with NSGs, then close the hybrid loop with a VPN Gateway + Private Endpoint.",
    topics:["VNets, subnets & address space","NSGs & ASGs (rules, priority)","VNet peering","User-defined routes (UDR)","Azure DNS & Private DNS","VPN Gateway (site-to-site)","ExpressRoute (concepts)","Load Balancer (L4)","Application Gateway (L7)","Private Endpoints & Service Endpoints","Azure Bastion","Network Watcher"] },
  { n:5, name:"Monitor & Maintain", weight:"10–15%",
    project:"Wire up observability: Log Analytics + KQL, a CPU alert with an action group, and Azure Backup with a test restore.",
    topics:["Azure Monitor: metrics vs logs","Log Analytics & KQL basics","Alerts & action groups","Azure Backup & Recovery vaults","Azure Site Recovery (concepts)","Update Manager","Connection troubleshooting"] }
];

/* ---------------- State + persistence ---------------- */
const KEY = "az104-progress-v1";
let state = {};            // { topicId: {s:0|1|2, note:""} }
let backend = "memory";    // "claude" | "local" | "memory"
let saveTimer = null;

function tid(d,i){ return "d"+d+"t"+i; }
function savedLabel(){
  return backend==="memory" ? "session only"
    : backend==="local" ? "saved · this browser"
    : "saved ✓";
}

async function loadState(){
  // 1) Inside Claude: use artifact storage
  if(typeof window.storage !== "undefined" && window.storage && typeof window.storage.get === "function"){
    backend = "claude";
    try{ const r = await window.storage.get(KEY); if(r && r.value) state = JSON.parse(r.value); }catch(e){}
    return;
  }
  // 2) Self-hosted webpage / local file: use the browser's own storage
  try{
    if(typeof localStorage !== "undefined"){
      backend = "local";
      const v = localStorage.getItem(KEY);
      if(v) state = JSON.parse(v);
      return;
    }
  }catch(e){}
  backend = "memory";
}
function persist(){
  try{
    if(backend==="claude") return window.storage.set(KEY, JSON.stringify(state));
    if(backend==="local")  localStorage.setItem(KEY, JSON.stringify(state));
  }catch(e){}
  return Promise.resolve();
}
function scheduleSave(){
  const el = document.getElementById("saveState");
  if(backend==="memory"){ el.textContent = "session only"; return; }
  el.textContent = "saving…";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try{ await persist(); el.textContent = savedLabel(); }
    catch(e){ el.textContent = "save failed"; }
  }, 350);
}
function getS(id){ return (state[id] && state[id].s) || 0; }

/* ---------------- Render ---------------- */
const STATUS = ["To do","Learning","Done"];
let total = 0;
DOMAINS.forEach(d=> total += d.topics.length);

function build(){
  // resources
  document.getElementById("resList").innerHTML = RES.map(r=>
    `<a href="${r[2]}" target="_blank" rel="noopener">${r[0]}<span>${r[1]} ↗</span></a>`
  ).join("");

  // chips
  document.getElementById("chips").innerHTML = DOMAINS.map((d,di)=>
    `<div class="chip">D${d.n}<b id="chip${di}">0/${d.topics.length}</b><div class="seg"><i id="seg${di}"></i></div></div>`
  ).join("");

  // domains
  document.getElementById("domains").innerHTML = DOMAINS.map((d,di)=>{
    const rows = d.topics.map((t,ti)=>{
      const id = tid(d.n,ti);
      const s = getS(id);
      const note = (state[id] && state[id].note) || "";
      const q = encodeURIComponent(t + " azure");
      return `<div class="topic ${s===2?'done':''}" data-id="${id}">
        <button class="pill" data-s="${s}" aria-label="Status: ${STATUS[s]}">${STATUS[s]}</button>
        <div class="tbody">
          <div class="tname"><span class="label">${t}</span>
            <a href="https://learn.microsoft.com/en-us/search/?terms=${q}" target="_blank" rel="noopener">Learn ↗</a>
            <button class="noteBtn">${note?'✎ note':'+ note'}</button>
          </div>
          <div class="noteWrap ${note?'':''}">
            <textarea placeholder="Jot a fact to look up during the open-book exam…">${note.replace(/</g,"&lt;")}</textarea>
          </div>
        </div>
      </div>`;
    }).join("");
    return `<section class="domain" data-di="${di}">
      <button class="dhead" aria-expanded="false">
        <span class="dnum">${String(d.n).padStart(2,"0")}</span>
        <span class="dmeta">
          <span class="dname">${d.name}</span>
          <span class="dsub">
            <span class="weight">${d.weight}</span>
            <span class="dprog"><i id="dp${di}"></i></span>
            <span class="dcount" id="dc${di}">0/${d.topics.length}</span>
          </span>
        </span>
        <span class="chev">›</span>
      </button>
      <div class="dbody">
        <p class="project"><b>Project step</b>${d.project}</p>
        ${rows}
      </div>
    </section>`;
  }).join("");

  wire();
  refresh();
}

function wire(){
  // accordion
  document.querySelectorAll(".dhead").forEach(h=>{
    h.addEventListener("click",()=>{
      const sec = h.closest(".domain");
      const open = sec.classList.toggle("open");
      h.setAttribute("aria-expanded", open);
    });
  });
  // status pills
  document.querySelectorAll(".pill").forEach(p=>{
    p.addEventListener("click",()=>{
      const row = p.closest(".topic");
      const id = row.dataset.id;
      const ns = (getS(id)+1)%3;
      state[id] = state[id]||{s:0,note:""};
      state[id].s = ns;
      p.dataset.s = ns; p.textContent = STATUS[ns]; p.setAttribute("aria-label","Status: "+STATUS[ns]);
      row.classList.toggle("done", ns===2);
      if(document.body.classList.contains("hiding") && ns===2) row.style.display="none";
      scheduleSave(); refresh();
    });
  });
  // notes
  document.querySelectorAll(".noteBtn").forEach(b=>{
    b.addEventListener("click",()=>{
      b.closest(".tbody").querySelector(".noteWrap").classList.toggle("open");
    });
  });
  document.querySelectorAll("textarea").forEach(ta=>{
    ta.addEventListener("input",()=>{
      const id = ta.closest(".topic").dataset.id;
      state[id] = state[id]||{s:0,note:""};
      state[id].note = ta.value;
      const btn = ta.closest(".tbody").querySelector(".noteBtn");
      btn.textContent = ta.value ? "✎ note" : "+ note";
      scheduleSave();
    });
  });
}

function refresh(){
  let done=0;
  DOMAINS.forEach((d,di)=>{
    let dd=0;
    d.topics.forEach((t,ti)=>{ if(getS(tid(d.n,ti))===2) dd++; });
    done+=dd;
    const pct = Math.round(dd/d.topics.length*100);
    document.getElementById("dp"+di).style.width = pct+"%";
    document.getElementById("dc"+di).textContent = dd+"/"+d.topics.length;
    document.getElementById("seg"+di).style.width = pct+"%";
    document.getElementById("chip"+di).textContent = dd+"/"+d.topics.length;
  });
  const pct = Math.round(done/total*100);
  document.getElementById("doneN").textContent = done;
  document.getElementById("totalN").textContent = total;
  document.getElementById("pctN").textContent = pct;
  document.getElementById("overallBar").style.width = pct+"%";
}

/* toolbar */
document.getElementById("hideBtn").addEventListener("click",function(){
  const on = document.body.classList.toggle("hiding");
  this.classList.toggle("toggled", on);
  this.textContent = on ? "Show all" : "Hide completed";
  document.querySelectorAll(".topic").forEach(r=>{
    r.style.display = (on && r.classList.contains("done")) ? "none" : "flex";
  });
});
document.getElementById("expandBtn").addEventListener("click",function(){
  const secs = document.querySelectorAll(".domain");
  const anyClosed = [...secs].some(s=>!s.classList.contains("open"));
  secs.forEach(s=>{ s.classList.toggle("open",anyClosed); s.querySelector(".dhead").setAttribute("aria-expanded",anyClosed); });
  this.textContent = anyClosed ? "Collapse all" : "Expand all";
});
document.getElementById("resetBtn").addEventListener("click",async function(){
  if(!confirm("Reset all progress and notes? This can't be undone.")) return;
  state = {};
  try{
    if(backend==="claude") await window.storage.delete(KEY);
    else if(backend==="local") localStorage.removeItem(KEY);
  }catch(e){}
  build();
  document.getElementById("saveState").textContent = backend==="memory" ? "session only" : "reset ✓";
});

/* init */
(async function(){
  await loadState();
  build();
  document.getElementById("saveState").textContent = savedLabel();
})();
</script>
</body>
</html>
